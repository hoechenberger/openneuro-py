# Prevent lefthook from calling git-lfs hooks, which can hold the index lock
# and cause lefthook's internal `git status` calls to deadlock.
skip_lfs: true

pre-commit:
  jobs:
    # Stage 1: Linting
    - name: lint
      group:
        parallel: true
        jobs:
          - name: ruff-lint
            glob: "*.py"
            run: uv run ruff check --fix {staged_files}

          - name: tombi-lint
            glob: "*.toml"
            run: uv run tombi lint {staged_files}

    # Stage 2: Formatting
    - name: format
      group:
        parallel: true
        jobs:
          - name: ruff-format
            glob: "*.py"
            run: uv run ruff format {staged_files}

          - name: tombi-format
            glob: "*.toml"
            run: uv run tombi format {staged_files}

    # Stage 3: Type checking
    - name: type-check
      glob: "src/**/*.py"
      run: uv run ty check {staged_files}

post-merge:
  commands:
    check-deps-changed:
      files: git diff-tree -r --name-only --no-commit-id ORIG_HEAD HEAD
      glob:
        - .python-version
        - pyproject.toml
        - uv.lock
      run: |
        echo ""
        echo "========================================================="
        echo "⚠️ Project definition files have changed:"
        echo ""
        for file in {files}; do
          echo "   • $file"
        done
        echo ""
        echo "   👉 Run 'uv sync --locked' to update your environment"
        echo "========================================================="
        echo ""
